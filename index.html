<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APA Evidence Simulation — Module 1</title>
  <style>
    :root {
      --bg: #f4f8fb;
      --panel: #ffffff;
      --panel-alt: #eef4f8;
      --border: #c9d8e4;
      --text: #183247;
      --muted: #526b7d;
      --accent: #2c6e91;
      --accent-dark: #1f536e;
      --success-bg: #e7f6ec;
      --success-border: #7eb68f;
      --error-bg: #fbeaea;
      --error-border: #d48a8a;
      --warning-bg: #fff8e8;
      --warning-border: #d8b96a;
      --shadow: 0 10px 24px rgba(24, 50, 71, 0.08);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .app-shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .panel h1,
    .panel h2,
    .panel h3,
    .panel h4,
    .panel p {
      margin-top: 0;
    }

    .system-title {
      font-size: 1.5rem;
      margin-bottom: 6px;
    }

    .subtle {
      color: var(--muted);
    }

    .status-grid {
      display: grid;
      gap: 10px;
    }

    .status-chip {
      background: var(--panel-alt);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
    }

    .module-label {
      display: inline-block;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent-dark);
      background: #dcecf5;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
    }

    .case-title {
      font-size: 1.35rem;
      margin-bottom: 6px;
    }

    .prompt-box {
      background: var(--panel-alt);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin: 14px 0 18px;
    }

    .overview-box {
      background: #f8fbfd;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .overview-box ul {
      margin: 8px 0 0 18px;
      padding: 0;
    }

    .option-list {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .option {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      transition: border-color 0.2s ease, background 0.2s ease;
      cursor: pointer;
    }

    .option:hover {
      border-color: var(--accent);
      background: #f9fcfe;
    }

    .option input {
      margin-top: 4px;
      cursor: pointer;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 11px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.05s ease, opacity 0.2s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .primary-btn {
      background: var(--accent);
      color: #fff;
